<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Art | Sri Kotala</title>
    <meta
      name="description"
      content="Art page for Sri Kotala with a gallery-like layout and a soft blue cloud-inspired visual style."
    />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="art">
    <div class="site-layout">
      <aside class="sidebar">
        <div class="sidebar-top">
          <a class="profile-link" href="./index.html" aria-label="Go to homepage">
            <img class="profile-photo" src="./assets/profile-photo.svg" alt="Stylized portrait placeholder for Sri Kotala" />
          </a>

          <nav class="sidebar-nav" aria-label="Primary">
            <a class="sidebar-link" href="./index.html"><span class="sidebar-icon">⌂</span><span>Home Page</span></a>
            <a class="sidebar-link" href="./resume.html"><span class="sidebar-icon">◉</span><span>Resume</span></a>
            <a class="sidebar-link" href="./projects.html"><span class="sidebar-icon">▣</span><span>Projects</span></a>
            <a class="sidebar-link" href="./blog.html"><span class="sidebar-icon">✎</span><span>Blog</span></a>
            <a class="sidebar-link is-active" href="./art.html"><span class="sidebar-icon">✦</span><span>Art</span></a>
          </nav>
        </div>

        <div class="sidebar-bottom">
          <div class="social-row">
            <a class="social-pill social-icon" href="https://twitter.com/your-handle" target="_blank" rel="noreferrer" aria-label="Twitter placeholder">X</a>
            <a class="social-pill social-icon" href="https://www.tiktok.com/@your-handle" target="_blank" rel="noreferrer" aria-label="TikTok placeholder">TT</a>
            <a class="social-pill social-icon" href="https://www.instagram.com/your-handle" target="_blank" rel="noreferrer" aria-label="Instagram placeholder">IG</a>
            <a class="social-pill social-icon" href="https://www.linkedin.com/in/your-handle" target="_blank" rel="noreferrer" aria-label="LinkedIn placeholder">IN</a>
          </div>

          <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle dark mode">
            <span class="theme-toggle-knob"></span>
            <span>Dark / Light</span>
          </button>
        </div>
      </aside>

      <main class="content-shell">
        <section class="content-panel intro-panel" data-reveal>
          <div class="eyebrow">Art</div>
          <h1>A Sri Collection</h1>
          <p class="subhead">A gallery page with bright pieces, expressive colors, and a warmer personal feel</p>
        </section>

        <section class="art-grid content-panel" data-reveal>
          <article class="art-card"><img src="./assets/cloud-banner.svg" alt="Cloud banner artwork" /></article>
          <article class="art-card"><img src="./assets/photo-04.svg" alt="Window sky illustration" /></article>
          <article class="art-card"><img src="./assets/photo-05.svg" alt="Evening air illustration" /></article>
          <article class="art-card"><img src="./assets/photo-02.svg" alt="Cloud drift illustration" /></article>
          <article class="art-card"><img src="./assets/photo-06.svg" alt="Soft current illustration" /></article>
          <article class="art-card"><img src="./assets/photo-03.svg" alt="Blue line illustration" /></article>
        </section>
      </main>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
